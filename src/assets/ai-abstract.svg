<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" role="img" aria-labelledby="title desc">
  <title id="title">Abstract AI Network</title>
  <desc id="desc">Layered gradients, flowing paths, and node clusters representing machine intelligence.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="flowA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0"/>
      <stop offset="45%" stop-color="#14b8a6" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="flowB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0"/>
      <stop offset="55%" stop-color="#a78bfa" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1200" height="500" fill="url(#bg)"/>

  <g opacity="0.35" filter="url(#soft)">
    <circle cx="210" cy="120" r="80" fill="#22d3ee"/>
    <circle cx="970" cy="390" r="120" fill="#34d399"/>
    <circle cx="840" cy="120" r="95" fill="#a78bfa"/>
  </g>

  <g fill="none" stroke-linecap="round">
    <path d="M-50 340 C 180 230, 320 410, 540 290 S 930 170, 1260 280" stroke="url(#flowA)" stroke-width="18"/>
    <path d="M-80 150 C 120 70, 300 220, 500 145 S 860 85, 1260 170" stroke="url(#flowB)" stroke-width="12"/>
    <path d="M-40 430 C 260 360, 420 460, 650 370 S 980 300, 1260 360" stroke="url(#flowA)" stroke-width="8"/>
  </g>

  <g stroke="#67e8f9" stroke-opacity="0.55" fill="#bae6fd" fill-opacity="0.9">
    <circle cx="180" cy="180" r="5"/>
    <circle cx="260" cy="220" r="4"/>
    <circle cx="340" cy="180" r="4"/>
    <circle cx="430" cy="240" r="5"/>
    <circle cx="510" cy="200" r="4"/>
    <circle cx="610" cy="250" r="5"/>
    <circle cx="720" cy="190" r="4"/>
    <circle cx="810" cy="240" r="5"/>
    <circle cx="900" cy="190" r="4"/>
    <circle cx="1010" cy="240" r="5"/>
    <line x1="180" y1="180" x2="260" y2="220"/>
    <line x1="260" y1="220" x2="340" y2="180"/>
    <line x1="340" y1="180" x2="430" y2="240"/>
    <line x1="430" y1="240" x2="510" y2="200"/>
    <line x1="510" y1="200" x2="610" y2="250"/>
    <line x1="610" y1="250" x2="720" y2="190"/>
    <line x1="720" y1="190" x2="810" y2="240"/>
    <line x1="810" y1="240" x2="900" y2="190"/>
    <line x1="900" y1="190" x2="1010" y2="240"/>
  </g>
</svg>
